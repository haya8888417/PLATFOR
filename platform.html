<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wa'i Platform</title>
    <!-- 🖼️ Browser Tab Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-white text-gray-900 font-sans min-h-screen flex flex-col">

    <!-- ⏳ Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-emerald-600 mb-3"></div>
        <p class="text-xs text-gray-500 font-medium animate-pulse">Loading Platform...</p>
    </div>

    <!-- 🔐 Sign-In Box -->
    <div id="login-card" class="hidden fixed inset-0 bg-white flex flex-col items-center justify-center p-4 z-40">
        <div class="max-w-sm w-full text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Wa'i Platform</h1>
            <p class="text-xs text-gray-500 mb-6">Connect, share attachments, and seek verified guidance.</p>
            <button id="btn-login" class="w-full flex items-center justify-center gap-3 bg-gray-900 hover:bg-gray-800 text-white font-semibold py-3 px-4 rounded-xl transition shadow-md text-sm">
                Sign In with Google
            </button>
        </div>
    </div>

    <!-- 🔝 TOP NAVBAR HEADER -->
    <header id="app-header" class="hidden sticky top-0 bg-white border-b border-gray-100 z-30 px-4 py-2 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <!-- 🖼️ Header Logo Image + Text -->
            <div class="flex items-center gap-2">
                <img src="logo.png" alt="Wa'i Platform Logo" class="h-9 w-9 object-contain rounded-full shadow-sm">
                <h1 class="text-xl font-extrabold text-emerald-800 tracking-tight">Wa'i</h1>
            </div>
            <div id="user-badges-container" class="flex gap-1.5 items-center ml-2"></div>
        </div>

        <div class="flex items-center gap-2">
            <button id="btn-open-profile" title="Profile Settings" class="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
            <button id="btn-logout" class="text-xs font-semibold text-red-500 hover:text-red-700 px-2 py-1">Log Out</button>
        </div>
    </header>

    <!-- 🌐 MAIN CONTAINER -->
    <main id="app-dashboard" class="hidden flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 📸 ATTACHMENTS FEED -->
        <section class="lg:col-span-2 space-y-4">
            <div class="border-b pb-2 flex justify-between items-center">
                <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500">Shared Attachments & Resources</h2>
            </div>
            
            <div id="attachments-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <p class="text-gray-400 text-xs italic col-span-2">No attachments published yet.</p>
            </div>
        </section>

        <!-- 🟢 PIOUS GUIDES DIRECTORY -->
        <aside class="space-y-4">
            <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 sticky top-20">
                <h3 class="font-bold text-gray-800 text-sm mb-3 flex items-center gap-2">
                    <span class="h-2 w-2 rounded-full bg-emerald-500"></span> Pious Guides
                </h3>
                <div id="pious-list" class="space-y-2.5 max-h-96 overflow-y-auto pr-1">
                    <p class="text-gray-400 text-xs italic">No active guides online...</p>
                </div>
            </div>
        </aside>

    </main>

    <!-- 📝 Profile Modal -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 relative">
            <button id="btn-close-profile-modal" class="absolute top-4 right-4 text-gray-400 text-lg">&times;</button>
            <h2 class="text-lg font-bold text-gray-800 mb-1">User Settings</h2>
            <form id="profile-form" class="space-y-3 mt-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Gender</label>
                    <select id="user-gender" required class="w-full text-xs p-2.5 border rounded-xl bg-gray-50">
                        <option value="">-- Select --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Phone / WhatsApp Contact</label>
                    <input id="user-phone" type="text" placeholder="+60... or +1..." class="w-full text-xs p-2.5 border rounded-xl bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-2.5 rounded-xl text-xs mt-2">Save Profile</button>
            </form>
        </div>
    </div>

    <!-- 📤 Attacher Upload Modal -->
    <div id="attacher-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 relative">
            <button id="btn-close-attacher-modal" class="absolute top-4 right-4 text-gray-400 text-lg">&times;</button>
            <h2 class="text-lg font-bold text-gray-800 mb-1">Upload Attachment</h2>
            <div class="space-y-3 mt-4">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Title</label>
                    <input id="upload-title" type="text" placeholder="Title..." class="w-full text-xs p-2.5 border rounded-xl">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">File</label>
                    <input id="upload-file" type="file" class="w-full text-xs p-1.5 border rounded-xl">
                </div>
                <button id="btn-upload" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl text-xs">Publish Attachment</button>
            </div>
        </div>
    </div>

    <!-- 🕌 Pious Modal -->
    <div id="pious-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 relative">
            <button id="btn-close-pious-modal" class="absolute top-4 right-4 text-gray-400 text-lg">&times;</button>
            <h2 class="text-lg font-bold text-emerald-900 mb-1">Pious Guide Settings</h2>
            <div class="space-y-3 mt-4">
                <button id="btn-toggle-free-status" type="button" class="w-full py-2 rounded-xl text-xs font-bold transition">Free Anytime: OFF</button>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Bio</label>
                    <textarea id="pious-bio" placeholder="Bio..." class="w-full text-xs p-2.5 border rounded-xl h-16"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">WhatsApp Contact Number</label>
                    <input id="pious-contact" type="text" placeholder="e.g. +60123456789 or +123456789" class="w-full text-xs p-2.5 border rounded-xl">
                </div>
                <button id="btn-save-pious-folder" class="w-full bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-xs">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAMCKIOQz9qjGaH0hacpHQOOolK7zJ4SMI",
            authDomain: "wa-i-platform.firebaseapp.com",
            databaseURL: "https://wa-i-platform-default-rtdb.firebaseio.com",
            projectId: "wa-i-platform",
            storageBucket: "wa-i-platform.firebasestorage.app",
            messagingSenderId: "302571737381",
            appId: "1:302571737381:web:66199076cffeffdac10acc",
            measurementId: "G-Q69FMH6XB1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        const loadingScreen = document.getElementById('loading-screen');
        const loginCard = document.getElementById('login-card');
        const appHeader = document.getElementById('app-header');
        const appDashboard = document.getElementById('app-dashboard');
        
        const profileModal = document.getElementById('profile-modal');
        const attacherModal = document.getElementById('attacher-modal');
        const piousModal = document.getElementById('pious-modal');
        const btnToggleFree = document.getElementById('btn-toggle-free-status');

        let currentUserData = {};
        let isFreeAnytimeState = false;

        auth.onAuthStateChanged((user) => {
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                if (user) {
                    loginCard.style.display = 'none';
                    appHeader.classList.remove('hidden');
                    appDashboard.classList.remove('hidden');

                    const userRef = database.ref('users/' + user.uid);
                    userRef.child('email').set(user.email);
                    userRef.child('isOnline').set(true);
                    userRef.child('isOnline').onDisconnect().set(false);

                    userRef.on('value', (snapshot) => {
                        currentUserData = snapshot.val() || {};
                        
                        if (currentUserData.piousFolder) {
                            isFreeAnytimeState = !!currentUserData.piousFolder.isFreeAnytime;
                            updateFreeButtonUI();
                            document.getElementById('pious-bio').value = currentUserData.piousFolder.bio || '';
                            document.getElementById('pious-contact').value = currentUserData.piousFolder.contact || '';
                        }

                        if (!currentUserData.gender) {
                            profileModal.classList.remove('hidden');
                        } else {
                            renderRoleBadges(currentUserData);
                        }
                    });
                } else {
                    appHeader.classList.add('hidden');
                    appDashboard.classList.add('hidden');
                    loginCard.style.display = 'flex';
                }
            }, 500);
        });

        function renderRoleBadges(data) {
            const container = document.getElementById('user-badges-container');
            container.innerHTML = "";

            if (data.isPious) {
                const btnPious = document.createElement('button');
                btnPious.className = "text-[10px] font-bold bg-emerald-100 text-emerald-800 px-2.5 py-1 rounded-full uppercase";
                btnPious.textContent = "PIOUS";
                btnPious.onclick = () => piousModal.classList.remove('hidden');
                container.appendChild(btnPious);
            }

            if (data.isAttacher) {
                const btnAttacher = document.createElement('button');
                btnAttacher.className = "text-[10px] font-bold bg-blue-100 text-blue-800 px-2.5 py-1 rounded-full uppercase";
                btnAttacher.textContent = "ATTACHER";
                btnAttacher.onclick = () => attacherModal.classList.remove('hidden');
                container.appendChild(btnAttacher);
            }
        }

        function updateFreeButtonUI() {
            if (isFreeAnytimeState) {
                btnToggleFree.textContent = "Free Anytime: ON";
                btnToggleFree.className = "w-full py-2 rounded-xl text-xs font-bold bg-amber-500 text-white transition";
            } else {
                btnToggleFree.textContent = "Free Anytime: OFF";
                btnToggleFree.className = "w-full py-2 rounded-xl text-xs font-bold bg-gray-200 text-gray-700 transition";
            }
        }

        btnToggleFree.onclick = () => {
            isFreeAnytimeState = !isFreeAnytimeState;
            updateFreeButtonUI();
        };

        document.getElementById('btn-save-pious-folder').onclick = () => {
            const bio = document.getElementById('pious-bio').value.trim();
            const contact = document.getElementById('pious-contact').value.trim();

            database.ref('users/' + auth.currentUser.uid + '/piousFolder').set({
                isFreeAnytime: isFreeAnytimeState,
                bio: bio,
                contact: contact
            }).then(() => piousModal.classList.add('hidden'));
        };

        document.getElementById('btn-open-profile').onclick = () => {
            document.getElementById('user-gender').value = currentUserData.gender || "";
            document.getElementById('user-phone').value = currentUserData.phone || "";
            profileModal.classList.remove('hidden');
        };

        document.getElementById('profile-form').onsubmit = (e) => {
            e.preventDefault();
            database.ref('users/' + auth.currentUser.uid).update({
                gender: document.getElementById('user-gender').value,
                phone: document.getElementById('user-phone').value.trim()
            }).then(() => profileModal.classList.add('hidden'));
        };

        document.getElementById('btn-close-profile-modal').onclick = () => profileModal.classList.add('hidden');
        document.getElementById('btn-close-attacher-modal').onclick = () => attacherModal.classList.add('hidden');
        document.getElementById('btn-close-pious-modal').onclick = () => piousModal.classList.add('hidden');

        document.getElementById('btn-upload').onclick = () => {
            const title = document.getElementById('upload-title').value.trim();
            const file = document.getElementById('upload-file').files[0];
            if (!title || !file) return alert("Select file and title.");

            const ref = storage.ref('attachments/' + Date.now() + '_' + file.name);
            ref.put(file).then(s => s.ref.getDownloadURL()).then(url => {
                database.ref('attachments').push({ title, url, uploader: auth.currentUser.email });
                attacherModal.classList.add('hidden');
            });
        };

        database.ref('attachments').on('value', (snapshot) => {
            const container = document.getElementById('attachments-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if (!data) return container.innerHTML = `<p class="text-gray-400 text-xs italic">No attachments yet.</p>`;

            Object.keys(data).forEach(k => {
                const item = data[k];
                container.innerHTML += `
                    <a href="${item.url}" target="_blank" class="p-4 bg-white border border-gray-200 rounded-2xl hover:border-emerald-500 transition shadow-sm block">
                        <h4 class="font-bold text-gray-800 text-sm mb-1">${item.title}</h4>
                        <p class="text-[10px] text-gray-400">By: ${item.uploader}</p>
                    </a>
                `;
            });
        });

        database.ref('users').on('value', (snapshot) => {
            const container = document.getElementById('pious-list');
            container.innerHTML = "";
            const users = snapshot.val() || {};
            let count = 0;

            Object.keys(users).forEach(id => {
                const u = users[id];
                if (u.isPious && u.piousFolder) {
                    count++;
                    const isOnline = !!u.isOnline;
                    const isFreeAnytime = !!u.piousFolder.isFreeAnytime;
                    
                    // Contact via WhatsApp is only permitted when guide is Online AND Free Anytime is ON
                    const canContact = isOnline && isFreeAnytime;
                    
                    const dotClass = isFreeAnytime ? "bg-amber-500" : (isOnline ? "bg-emerald-500" : "bg-gray-300");
                    const rawPhone = u.piousFolder.contact ? u.piousFolder.contact.replace(/[^\d]/g, '') : '';

                    container.innerHTML += `
                        <div class="p-3 bg-white rounded-xl border text-xs">
                            <div class="flex justify-between items-center font-bold text-gray-800 mb-1">
                                <span class="flex items-center gap-1.5"><span class="h-2 w-2 rounded-full ${dotClass}"></span>${u.email.split('@')[0]}</span>
                                ${isFreeAnytime ? '<span class="text-[9px] bg-amber-100 text-amber-800 px-1 rounded">FREE</span>' : ''}
                            </div>
                            <p class="text-gray-500 text-[11px] mb-2">${u.piousFolder.bio || ''}</p>
                            ${canContact && rawPhone ? `<a href="https://wa.me/${rawPhone}" target="_blank" class="text-[10px] text-emerald-700 font-bold underline">Contact Guide</a>` : `<span class="text-[10px] text-gray-400 italic">Guide Unavailable</span>`}
                        </div>
                    `;
                }
            });
            if (!count) container.innerHTML = `<p class="text-gray-400 text-xs italic">No guides listed.</p>`;
        });

        document.getElementById('btn-logout').onclick = () => auth.signOut();
        document.getElementById('btn-login').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    </script>
</body>
</html>
